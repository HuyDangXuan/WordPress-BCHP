services:
  wordpress:
    build:
      context: ..
      dockerfile: docker/wordpress/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      booking-payment-service:
        condition: service_started
    env_file:
      - ../env/wordpress.env
    environment:
      WORDPRESS_CONFIG_EXTRA: |
        if ( isset( $$_SERVER['HTTP_X_FORWARDED_PROTO'] ) && false !== strpos( (string) $$_SERVER['HTTP_X_FORWARDED_PROTO'], 'https' ) ) {
            $$_SERVER['HTTPS'] = 'on';
        }
        if ( isset( $$_SERVER['HTTP_X_FORWARDED_HOST'] ) && '' !== $$_SERVER['HTTP_X_FORWARDED_HOST'] ) {
            $$_SERVER['HTTP_HOST'] = $$_SERVER['HTTP_X_FORWARDED_HOST'];
        }
        if ( isset( $$_SERVER['HTTP_X_FORWARDED_PORT'] ) && '' !== $$_SERVER['HTTP_X_FORWARDED_PORT'] ) {
            $$_SERVER['SERVER_PORT'] = $$_SERVER['HTTP_X_FORWARDED_PORT'];
        }
        $$public_site_url = getenv( 'PUBLIC_SITE_URL' );
        if ( false !== $$public_site_url && '' !== $$public_site_url ) {
            if ( ! defined( 'WP_HOME' ) ) {
                define( 'WP_HOME', $$public_site_url );
            }
            if ( ! defined( 'WP_SITEURL' ) ) {
                define( 'WP_SITEURL', $$public_site_url );
            }
        }
        if ( ! defined( 'WP_DEBUG_LOG' ) ) {
            define( 'WP_DEBUG_LOG', true );
        }
    ports:
      - "8080:80"
    volumes:
      - wordpress_data:/var/www/html
      - ../wordpress/wp-content/themes/op-travel-shop:/var/www/html/wp-content/themes/op-travel-shop
      - ../wordpress/wp-content/plugins/op-travel-core:/var/www/html/wp-content/plugins/op-travel-core
      - ../wordpress/wp-content/plugins/op-travel-sepay:/var/www/html/wp-content/plugins/op-travel-sepay
      - ../wordpress/wp-content/plugins/op-travel-storefront-cms:/var/www/html/wp-content/plugins/op-travel-storefront-cms

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80"

  mongodb:
    image: mongo:7.0
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db

  booking-payment-service:
    build:
      context: ..
      dockerfile: docker/service/Dockerfile
    depends_on:
      mongodb:
        condition: service_started
    env_file:
      - ../env/service.env
    ports:
      - "8787:8787"

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - public-webhook
    depends_on:
      booking-payment-service:
        condition: service_started
    env_file:
      - ../env/tunnel.env
    command: tunnel --no-autoupdate run
    restart: unless-stopped

volumes:
  wordpress_data:
  mysql_data:
  mongo_data:
