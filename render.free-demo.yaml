services:
  - name: booking-payment-service-free
    type: web
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: docker/service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PAYOS_CLIENT_ID
        value: demo-client-id
      - key: PAYOS_API_KEY
        value: demo-api-key
      - key: PAYOS_CHECKSUM_KEY
        value: demo-checksum-key
      - key: ZALOPAY_APP_ID
        value: demo-app-id
      - key: ZALOPAY_KEY1
        value: demo-key1
      - key: ZALOPAY_KEY2
        value: demo-key2
      - key: ZALOPAY_ENV
        value: sandbox
      - key: ZALOPAY_CALLBACK_URL
        value: https://example.invalid/api/payments/zalopay/callback
      - key: PAYMENT_SYNC_SECRET
        value: free-demo-change-me
      - key: WORDPRESS_CONFIRM_ENDPOINT
        sync: false
